<head>

    :root {
      --accent: rgb(20, 120, 62);
      --accent-strong: rgb(16, 103, 53);
      --text-primary: #1d1d1f;
      --text-secondary: #424245;
      --text-tertiary: #6e6e73;
      --surface: #f5f5f7;
      --surface-soft: #f2f2f5;
      --border: #d2d2d7;
      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 16px;
      --content-max: 1120px;
      --local-nav-h: 52px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--surface);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "SF Pro Display", "SF Pro SC",
        "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC",
        "Microsoft YaHei", "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);
      background: var(--surface);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    /* Language-specific tuning: keep Latin glyphs in system/SF, CJK in CJK system fonts */
    :lang(zh), :lang(zh-CN), :lang(zh-Hans) {
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC",
        "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    :lang(en) {
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    /* Enable numeric features similar to Apple typography */
    body {
      font-kerning: normal;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .local-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--local-nav-h);
      z-index: 100;
      background: rgba(245, 245, 247, 0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid #d9d9de;
    }

    .local-nav-inner {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      height: 100%;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .local-title {
      font-size: 21px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: -0.02em;
      color: #1d1d1f;
    }

    .local-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      color: #515154;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
      transition: all 0.28s var(--ease);
      border: 0;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 9px 18px;
      font-weight: 500;
    }

    .local-nav .btn-primary {
      font-size: 13px;
      padding: 8px 16px;
    }

    .btn-primary:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .main {
      padding-top: var(--local-nav-h);
      background: var(--surface);
    }

    .section {
      position: relative;
      background: var(--surface);
    }

    .section-content {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      padding: 0 20px;
    }

    .hero {
      background: var(--surface);
      text-align: center;
      padding-top: 98px;
      padding-bottom: 56px;
    }

    .hero-app {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(20, 27, 22, 0.18);
    }

    .hero-product {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #1d1d1f;
    }

    .hero-title {
      margin: 22px auto 14px;
      max-width: 980px;
      font-size: clamp(32px, 4.2vw, 66px);
      line-height: 1.18;
      letter-spacing: -0.04em;
      font-weight: 600;
      text-wrap: normal;
    }

    .hero-title .accent {
      color: var(--accent);
    }

    .hero-copy {
      max-width: 980px;
      margin: 0 auto;
      font-size: clamp(15px, 1.2vw, 20px);
      line-height: 1.45;
      letter-spacing: -0.015em;
      color: var(--text-secondary);
      text-wrap: normal;
    }

    .hero-cta {
      margin-top: 30px;
    }

    .hero-cta .btn-primary {
      padding: 14px 28px;
    }

    .device-panorama {
      background: var(--surface);
      padding-top: 112px;
      padding-bottom: 20px;
      overflow-x: clip;
      overflow-y: visible;
    }

    .device-strip {
      width: min(2860px, 190vw);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 0;
      padding: 0;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      isolation: isolate;
    }

    .phone-unit {
      width: clamp(340px, 30.5vw, 560px);
      flex: 0 0 auto;
      position: relative;
      transform: translate3d(0, var(--y, 0px), 0);
      will-change: transform;
    }

    /* Apple-style overlap: only let transparent shadow areas overlap */
    .phone-unit + .phone-unit {
      margin-left: clamp(-158px, -9.4vw, -94px);
    }

    .phone-unit:nth-child(3) { z-index: 5; }
    .phone-unit:nth-child(2),
    .phone-unit:nth-child(4) { z-index: 4; }
    .phone-unit:nth-child(1),
    .phone-unit:nth-child(5) { z-index: 3; }

    .phone-unit img {
      width: 100%;
      height: auto;
      display: block;
      transform: translateX(16.65%);
      will-change: transform;
    }

    .panorama-message {
      background: var(--surface);
      padding: 40px 0 112px;
    }

    .panorama-message .section-title {
      margin-bottom: 0;
      font-size: clamp(24px, 3.2vw, 42px);
      line-height: 1.28;
      letter-spacing: -0.034em;
    }

    .panorama-sequence {
      display: grid;
      justify-items: center;
      gap: clamp(52px, 8.4vh, 108px);
    }

    .panorama-slogan {
      text-align: center;
      opacity: 0;
      transform: translate3d(0, 56px, 0);
      will-change: opacity, transform;
    }

    .eyebrow {

      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .section-title {

      letter-spacing: -0.045em;
      font-weight: 600;
      font-family: inherit;
      margin-bottom: 16px;
      text-wrap: normal;
      color: #1d1d1f;
    }

    .section-title .accent {
      color: var(--accent);
    }

    /* Center text optically by excluding trailing punctuation from layout width (Apple-style) */
    .punct-anchor {
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }

    .punct-anchor::after {
      content: attr(data-punct);
      position: absolute;
      top: 0;
      left: 100%;
      margin-left: 0em; /* tighten punctuation spacing (tweak if needed) */
      color: currentColor;
      font: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      pointer-events: none;
    }

    /* Allow punctuation to inherit accent color when the anchor itself is accented */
    .punct-anchor.accent {
      color: var(--accent);
    }

    .section-copy {

    .follow-replay {

    .follow-media {

    footer {

    .footer-divider {

    .footer-meta {

      line-height: 1.5;

    .footer-link {

    .footer-right {

      align-items: center;
      gap: 10px;

    }

    .footer-sep {
      color: #9a9aa1;
    }

    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1068px) {
      .follow-media video {

      .phone-unit + .phone-unit {

    @media (max-width: 734px) {

      }

      .local-title {

      }

      .local-actions a:not(.btn) {
        display: none;
      }

      .footer-meta {
        white-space: normal;
        flex-wrap: wrap;
      }

      .footer-copy {
        width: 100%;
      }

      .footer-right {
        margin-left: 0;
        width: 100%;
      }

      .hero {
        padding-top: 62px;
        padding-bottom: 40px;
      }

      .hero-app {
        width: 76px;
        height: 76px;

      }

      .hero-title {
        margin-top: 16px;
        font-size: clamp(30px, 8.5vw, 48px);
      }

      .hero-product {
        font-size: 14px;
      }

      .hero-copy {
        font-size: 16px;
      }

      .device-panorama {
        padding-top: 52px;
        padding-bottom: 8px;
        overflow: hidden;
      }

      .device-strip {
        width: max-content;
        gap: 0;
      }

      .phone-unit {
        width: min(68vw, 340px);
      }

      .phone-unit + .phone-unit {
        margin-left: clamp(-96px, -22vw, -68px);
      }

      .panorama-message {
        padding: 40px 0 86px;
      }

      .panorama-message .section-title {
        font-size: clamp(25px, 7.4vw, 36px);
        line-height: 1.16;
      }

      .panorama-sequence {
        gap: 56px;
      }

      .cooking-follow {
        padding-bottom: 84px;
      }

      .follow-media video {
        width: min(100%, 300px);
        border-radius: 0;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      html {
        scroll-behavior: auto;
      }

      .panorama-slogan {
        opacity: 1;
        transform: none;
      }
    }
  </style>

  <script>
    (function () {
      const revealEls = document.querySelectorAll('.reveal');
      const panorama = document.querySelector('.device-panorama');
      const settlePoint = document.querySelector('.panorama-message');
      const panoramaMessage = document.querySelector('.panorama-message');
      const panoramaSlogans = panoramaMessage
        ? Array.from(panoramaMessage.querySelectorAll('.panorama-slogan'))
        : [];
      const phoneUnits = panorama ? Array.from(panorama.querySelectorAll('.phone-unit')) : [];
      const followVideo = document.querySelector('.follow-media video');
      const followReplayButton = document.querySelector('.follow-replay');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const smoothstep = (value) => value * value * (3 - 2 * value);

      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.18,
        rootMargin: '0px 0px -8% 0px'
      });

      revealEls.forEach((el) => revealObserver.observe(el));

      if (followVideo) {
        followVideo.loop = false;
      }

      if (followVideo && followReplayButton) {
        followReplayButton.addEventListener('click', () => {
          followVideo.currentTime = 0;
          const playPromise = followVideo.play();
          if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(() => {});
          }
        });
      }

      let rafPending = false;
      const readParallaxProgress = () => {
        if (!panorama || phoneUnits.length === 0) {
          return 1;
        }
        const viewportH = window.innerHeight;
        const scrollTop = window.scrollY || window.pageYOffset;
        const start = 0;
        const settleY = settlePoint
          ? settlePoint.offsetTop - viewportH * 0.74
          : panorama.offsetTop + panorama.offsetHeight * 0.54;
        const end = Math.max(start + 1, settleY);
        return clamp((scrollTop - start) / (end - start), 0, 1);
      };

      const readSloganProgress = () => {
        if (!panoramaMessage) {
          return 1;
        }
        const viewportH = window.innerHeight;
        const scrollTop = window.scrollY || window.pageYOffset;
        const timelineLeadOffset = 40;
        const start = panoramaMessage.offsetTop + timelineLeadOffset - viewportH;
        const end = panoramaMessage.offsetTop + panoramaMessage.offsetHeight - viewportH * 0.66;
        return clamp((scrollTop - start) / Math.max(1, end - start), 0, 1);
      };

      const updateSlogans = (globalProgress) => {
        if (panoramaSlogans.length === 0) {
          return;
        }

        const segment = 1 / panoramaSlogans.length;

        panoramaSlogans.forEach((item, index) => {
          const enterStart = segment * index;
          const enterEnd = segment * (index + 1);
          const localProgress = smoothstep(clamp(
            (globalProgress - enterStart) / Math.max(0.001, enterEnd - enterStart),
            0,
            1
          ));
          const yOffset = (1 - localProgress) * 56;
          item.style.opacity = localProgress.toFixed(3);
          item.style.transform = `translate3d(0, ${yOffset.toFixed(2)}px, 0)`;
        });
      };

      const updateScrollDrivenMotion = () => {
        if (!reduceMotion) {
          const parallaxProgress = readParallaxProgress();
          const mobileStaggerScale = window.matchMedia('(max-width: 734px)').matches ? 0.48 : 1;

          phoneUnits.forEach((unit) => {
            const startOffset = Number(unit.dataset.start || 0);
            const exponent = Number(unit.dataset.exp || 1);
            const eased = Math.pow(parallaxProgress, exponent);
            const staggerOffset = startOffset * mobileStaggerScale * (1 - eased);
            unit.style.setProperty('--y', `${staggerOffset}px`);
          });

          updateSlogans(readSloganProgress());
        } else {
          phoneUnits.forEach((unit) => unit.style.setProperty('--y', '0px'));
          updateSlogans(1);
        }
        rafPending = false;
      };

      const requestTick = () => {
        if (rafPending) {
          return;
        }
        rafPending = true;
        window.requestAnimationFrame(updateScrollDrivenMotion);
      };

      if (!reduceMotion) {
        window.addEventListener('scroll', requestTick, { passive: true });
        window.addEventListener('resize', requestTick);
      }
      requestTick();
    })();
  </script>
</body>
</html>
