<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A quiet personal homepage focused on identity and selected app work.">
  <link rel="icon" href="./assets/avatar.ico">
  <title>[YOUR_NAME] | Personal Homepage</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f2e8;
      --bg-soft: #f2ece1;
      --panel: rgba(255, 251, 245, 0.72);
      --panel-strong: rgba(255, 251, 245, 0.86);
      --glass-fill: rgba(255, 255, 255, 0.34);
      --glass-fill-strong: rgba(255, 255, 255, 0.5);
      --glass-edge: rgba(255, 255, 255, 0.56);
      --glass-edge-soft: rgba(255, 255, 255, 0.26);
      --glass-shadow: 0 18px 38px rgba(20, 24, 28, 0.07), 0 1px 0 rgba(255, 255, 255, 0.34) inset;
      --line: rgba(34, 38, 41, 0.08);
      --line-strong: rgba(34, 38, 41, 0.14);
      --ink: #17181b;
      --ink-soft: #545862;
      --ink-faint: #838892;
      --accent: #3f645f;
      --accent-soft: rgba(63, 100, 95, 0.08);
      --shadow: 0 18px 42px rgba(20, 24, 28, 0.05);
      --mono: "SFMono-Regular", "IBM Plex Mono", "Menlo", "Consolas", monospace;
      --sans: "SF Pro Text", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --serif: "Iowan Old Style", "Baskerville", "Palatino Linotype", "Times New Roman", serif;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --content-max: 920px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --topbar-h: 64px;
      --icon-tone: rgba(84, 88, 98, 0.8);
      --icon-tone-strong: rgba(23, 24, 27, 0.92);
      --icon-button-hover-bg: rgba(255, 255, 255, 0.2);
      --icon-button-hover-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        0 4px 12px rgba(20, 24, 28, 0.04);
      --menu-contact-tone: rgba(35, 39, 44, 0.88);
      --footer-divider: #d7d7dc;
      --footer-copy: #7f7f87;
      --contact-icon-filter: none;
      --hero-accent-shadow: 0 10px 24px rgba(63, 100, 95, 0.08);
      --hero-accent-shadow-strong: 0 16px 36px rgba(63, 100, 95, 0.16);
      --hero-avatar-shadow: 0 10px 24px rgba(20, 24, 28, 0.08);
      --hero-avatar-shadow-strong: 0 16px 34px rgba(20, 24, 28, 0.14);
      --app-icon-filter-rest: drop-shadow(0 7px 14px rgba(20, 24, 28, 0.08));
      --app-icon-filter-strong: drop-shadow(0 14px 24px rgba(20, 24, 28, 0.18));
      --app-store-filter-rest: drop-shadow(0 8px 18px rgba(20, 24, 28, 0.08));
      --app-store-filter-strong: drop-shadow(0 14px 26px rgba(20, 24, 28, 0.16));
      --app-website-shadow-rest: 0 10px 22px rgba(56, 118, 68, 0.22);
      --app-website-shadow-strong: 0 16px 32px rgba(56, 118, 68, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.92), transparent 34%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 42%, #f4efe5 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background: transparent;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.55;
      letter-spacing: -0.01em;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(rgba(21, 31, 36, 0.042) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 31, 36, 0.042) 1px, transparent 1px);
      background-size: 100% 44px, 44px 100%;
      mask-image: radial-gradient(circle at center, black 30%, transparent 82%);
      opacity: 0.46;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    ::selection {
      background: rgba(51, 95, 90, 0.14);
    }

    .container {
      width: min(100% - 48px, var(--content-max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: var(--topbar-h);
      padding-top: 12px;
      background: transparent;
      border-bottom: 0;
      pointer-events: none;
      display: flex;
      justify-content: flex-end;
    }

    .topbar-inner {
      min-height: calc(var(--topbar-h) - 8px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 9px 15px;
      width: max-content;
      max-width: calc(100% - 48px);
      margin-right: 24px;
      margin-left: auto;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.54), rgba(255, 255, 255, 0.16)),
        linear-gradient(180deg, rgba(247, 242, 232, 0.22), rgba(247, 242, 232, 0.08));
      box-shadow:
        0 20px 42px rgba(20, 24, 28, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.68),
        inset 0 -1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      position: relative;
      overflow: visible;
      pointer-events: auto;
      isolation: isolate;
    }

    .topbar-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.08) 42%, rgba(255, 255, 255, 0.14)),
        radial-gradient(circle at 18% -10%, rgba(255, 255, 255, 0.4), transparent 26%),
        radial-gradient(circle at 82% 110%, rgba(255, 255, 255, 0.12), transparent 32%);
      opacity: 0.94;
      pointer-events: none;
      z-index: -1;
    }

    .topbar-inner::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 24%, rgba(255, 255, 255, 0.04));
      pointer-events: none;
      opacity: 0.72;
      mix-blend-mode: screen;
    }

    .topbar-inner::after {
      display: none;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      justify-content: flex-end;
      position: relative;
      z-index: 1;
      gap: 8px;
    }

    .mobile-menu {
      display: none;
      position: relative;
    }

    .mobile-menu-toggle {
      appearance: none;
      width: 54px;
      height: 54px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.28)),
        linear-gradient(180deg, rgba(247, 242, 232, 0.32), rgba(247, 242, 232, 0.12));
      color: rgba(84, 88, 98, 0.82);
      cursor: pointer;
      box-shadow:
        0 20px 42px rgba(20, 24, 28, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.68),
        inset 0 -1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      transition: background-color 0.22s var(--ease), box-shadow 0.22s var(--ease), transform 0.22s var(--ease);
    }

    .mobile-menu-toggle:hover,
    .mobile-menu-toggle:focus-visible,
    .mobile-menu-toggle[aria-expanded="true"] {
      outline: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34)),
        linear-gradient(180deg, rgba(247, 242, 232, 0.36), rgba(247, 242, 232, 0.14));
      box-shadow:
        0 20px 42px rgba(20, 24, 28, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        inset 0 -1px 0 rgba(255, 255, 255, 0.14);
      transform: translateY(-0.5px);
    }

    .mobile-menu-bar {
      width: 14px;
      height: 1.5px;
      border-radius: 999px;
      background: currentColor;
      display: block;
    }

    .mobile-menu-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: min(248px, calc(100vw - 24px));
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7)),
        linear-gradient(180deg, rgba(247, 242, 232, 0.5), rgba(247, 242, 232, 0.3));
      box-shadow:
        0 22px 46px rgba(20, 24, 28, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        inset 0 -1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    .mobile-menu-panel[hidden] {
      display: none;
    }

    .contact-link {
      position: relative;
      padding: 0;
      border-radius: 999px;
      color: rgba(84, 88, 98, 0.74);
      transition: color 0.22s var(--ease), background-color 0.22s var(--ease), box-shadow 0.22s var(--ease), transform 0.22s var(--ease);
    }

    .contact-links {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 8px;
    }

    .contact-popover {
      position: relative;
      z-index: 1;
    }

    .contact-popover.is-menu {
      width: 100%;
    }

    .contact-popover.is-open {
      z-index: 120;
    }

    .contact-icon-button {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-tone);
      background: transparent;
      border: 0;
      cursor: pointer;
      opacity: 0.96;
    }

    .contact-icon-button svg {
      width: 16px;
      height: 16px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-icon-button svg path,
    .contact-icon-button svg rect,
    .contact-icon-button svg circle {
      vector-effect: non-scaling-stroke;
    }

    .contact-icon-stack {
      position: relative;
      width: 16px;
      height: 16px;
      display: block;
      flex: 0 0 auto;
    }

    .contact-icon-stack.is-static .contact-icon-img {
      opacity: 1;
      transition: none;
    }

    .contact-icon-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      filter: none;
      transition: opacity 0.18s var(--ease);
    }

    .contact-icon-img.is-hover,
    .contact-icon-img.is-active {
      opacity: 0;
    }

    .contact-icon-button:hover,
    .contact-icon-button:focus-visible,
    .contact-icon-button[aria-expanded="true"],
    .contact-link[aria-current="page"],
    .contact-link.is-active {
      color: var(--icon-tone-strong);
      outline: none;
      background: var(--icon-button-hover-bg);
      box-shadow: var(--icon-button-hover-shadow);
      transform: translateY(-0.5px);
    }

    .contact-icon-button:hover .contact-icon-img.is-default,
    .contact-icon-button:focus-visible .contact-icon-img.is-default,
    .contact-icon-button[aria-expanded="true"] .contact-icon-img.is-default,
    .contact-link[aria-current="page"] .contact-icon-img.is-default,
    .contact-link.is-active .contact-icon-img.is-default {
      opacity: 0;
    }

    .contact-icon-button:hover .contact-icon-img.is-hover,
    .contact-icon-button:focus-visible .contact-icon-img.is-hover,
    .contact-icon-button[aria-expanded="true"] .contact-icon-img.is-hover,
    .contact-link[aria-current="page"] .contact-icon-img.is-hover,
    .contact-link.is-active .contact-icon-img.is-hover {
      opacity: 1;
    }

    .contact-qr-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      z-index: 130;
      width: 182px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.3)),
        linear-gradient(180deg, rgba(247, 242, 232, 0.22), rgba(247, 242, 232, 0.08));
      box-shadow:
        0 18px 36px rgba(20, 24, 28, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .contact-qr-panel.is-menu {
      top: calc(100% + 8px);
      right: auto;
      left: 0;
    }

    .contact-qr-image {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .mobile-contact-links {
      display: grid;
      gap: 6px;
    }

    .menu-contact-link {
      width: 100%;
      height: auto;
      min-height: 42px;
      justify-content: flex-start;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--menu-contact-tone);
    }

    .menu-contact-link:hover,
    .menu-contact-link:focus-visible {
      transform: none;
      background: transparent;
      box-shadow: none;
    }

    .menu-contact-label {
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--menu-contact-tone);
      white-space: nowrap;
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .topbar {
        padding-top: 0;
        background: rgba(247, 242, 232, 0.94);
        border-bottom: 1px solid rgba(36, 45, 48, 0.05);
        pointer-events: auto;
      }

      .topbar-inner {
        min-height: var(--topbar-h);
        padding: 0;
        border-radius: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .topbar-inner::before,
      .topbar-inner::after {
        display: none;
      }
    }

    .main {
      padding: 28px 0 34px;
    }

    footer {
      padding: 22px 0 26px;
    }

    .footer-inner {
      width: min(100%, var(--content-max));
      margin: 0 auto;
      padding: 0 20px;
    }

    .footer-divider {
      width: min(100%, 980px);
      margin: 0 auto 14px;
      border-top: 1px solid var(--footer-divider);
    }

    .footer-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(100%, 980px);
      margin: 0 auto;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
    }

    .footer-copy {
      color: var(--footer-copy);
      flex: 0 1 auto;
    }

    .footer-right {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      position: relative;
    }

    .footer-contact-links {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .footer-right .contact-link {
      color: var(--icon-tone);
    }

    .footer-right .contact-icon-button {
      width: 26px;
      height: 26px;
    }

    .footer-right .contact-icon-button:hover,
    .footer-right .contact-icon-button:focus-visible,
    .footer-right .contact-icon-button[aria-expanded="true"] {
      background: var(--icon-button-hover-bg);
      box-shadow: var(--icon-button-hover-shadow);
    }

    .footer-right .contact-qr-panel {
      top: auto;
      bottom: calc(100% + 10px);
      right: 0;
    }

    .about {
      padding: 12px 0 42px;
    }

    .about-stack {
      display: grid;
      gap: 28px;
    }

    .hero-copy {
      padding-top: 4px;
    }

    .hero-meta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 50px;
    }

    .hero-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(36, 45, 48, 0.08);
      box-shadow: var(--hero-avatar-shadow);
      flex: 0 0 auto;
      transform: translateZ(0) scale(1);
      transform-origin: center;
      transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
    }

    .hero-meta-copy {
      display: grid;
      gap: 2px;
    }

    .hero-meta-name {
      font-size: 21px;
      font-weight: 560;
      letter-spacing: -0.028em;
      color: rgba(23, 24, 27, 0.84);
    }

    .hero-meta-role {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(84, 88, 98, 0.64);
      line-height: 1.45;
    }

    .eyebrow,
    .work-label,
    .profile-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      opacity: 0.68;
    }

    .work-label {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 42px);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 700;
      font-style: italic;
      text-transform: none;
      color: rgba(23, 24, 27, 0.94);
      opacity: 1;
    }

    .hero-title {
      margin: 0;
      max-width: none;
      text-align: center;
    }

    .hero-accent {
      font-family: var(--serif);
      font-size: clamp(62px, 9vw, 110px);
      line-height: 0.92;
      letter-spacing: -0.045em;
      font-weight: 500;
      color: rgba(63, 100, 95, 0.9);
      font-style: italic;
      display: block;
      margin: 0 auto;
      text-shadow: var(--hero-accent-shadow);
      transform: translateZ(0) scale(1);
      transform-origin: center;
      transition: transform 0.22s var(--ease), text-shadow 0.22s var(--ease);
    }

    .hero-copy + .surface,
    .hero-copy + .code-panel,
    .hero-copy + * .surface,
    .hero-copy + * .code-panel {
      margin-top: 18px;
    }

    .surface {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transform: translateZ(0);
      will-change: transform, box-shadow;
      transition: border-color 0.22s var(--ease), box-shadow 0.22s var(--ease), transform 0.22s var(--ease);
    }

    .surface::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        radial-gradient(circle at var(--pointer-x, 50%) var(--pointer-y, 50%), rgba(73, 129, 122, 0.05), transparent 28%);
      opacity: 0;
      transition: opacity 0.24s var(--ease);
      pointer-events: none;
    }

    .surface:hover,
    .surface:focus-within {
      border-color: rgba(34, 38, 41, 0.12);
      box-shadow: 0 22px 48px rgba(20, 24, 28, 0.07);
      transform: translate3d(0, -1px, 0);
    }

    .code-panel {
      background:
        linear-gradient(180deg, rgba(17, 21, 30, 0.98), rgba(16, 19, 27, 0.99));
      border: 1px solid rgba(92, 106, 130, 0.22);
      box-shadow: 0 24px 60px rgba(15, 18, 24, 0.16);
      color: #d8deeb;
    }

    .code-panel::before {
      background:
        radial-gradient(circle at var(--pointer-x, 50%) var(--pointer-y, 50%), rgba(104, 151, 168, 0.16), transparent 30%);
    }

    .code-panel:hover,
    .code-panel:focus-within {
      box-shadow: 0 28px 68px rgba(15, 18, 24, 0.18);
    }

    .code-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(109, 124, 150, 0.12);
      background: rgba(255, 255, 255, 0.018);
    }

    .code-lights {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .code-light {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: block;
    }

    .code-light.red {
      background: #ff6b5d;
    }

    .code-light.yellow {
      background: #f6bd4f;
    }

    .code-light.green {
      background: #61c554;
    }

    .code-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .code-tab {
      appearance: none;
      border: 0;
      padding: 7px 10px;
      border-radius: 9px;
      background: transparent;
      color: #7f8aac;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.22s var(--ease), color 0.22s var(--ease);
    }

    .code-tab:hover,
    .code-tab:focus-visible {
      color: #e5eaf5;
      background: rgba(255, 255, 255, 0.05);
      outline: none;
    }

    .code-tab.is-active {
      color: #f7fbfa;
      background: linear-gradient(135deg, #3f645f, #3f645f);
    }

    .code-body {
      padding: 16px 16px 18px;
    }

    .code-block {
      margin: 0;
      min-height: 236px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.78;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: break-word;
